id: 009_UI_INTEGRATION
title: UI Integration
goal: Connect existing tutor engine and UI primitives into a usable product interface
type: implementation

ui_mode:
  human_in_the_loop: true
  rules:
    - Do NOT autonomously design UI
    - Do NOT choose colors, layouts, or styling without user input
    - Ask for layout, components, and references before implementing
    - Present options before building
    - Wait for confirmation before coding UI
    - Use Tailwind CSS, shadcn/ui, Magic UI, React Bits
    - Treat UI like assembling LEGO blocks from existing components
    - Ask before adding animations or motion
    - Prioritize user-provided references over assumptions
