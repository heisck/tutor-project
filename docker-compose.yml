services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: ai-tutor-pwa-postgres
    environment:
      POSTGRES_DB: ai_tutor_pwa
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5433:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d ai_tutor_pwa']
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: ai-tutor-pwa-redis
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - redis-data:/data

volumes:
  postgres-data:
  redis-data:
